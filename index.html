<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Project: Tic Tac Toe</title>
</head>
<body>
<div class="wrapper">
  <div class="player-names">
    <p>Enter names for your marker</p>
    <input type="text" id="playerX" placeholder="Player X Name" required/>
    <input type="text" id="playerO" placeholder="Player O Name" required/>
    <button id="startGameBtn">Start Game</button>
  </div>

  <div class="scores">
    <div class="x-score">X <span class="score">0</span></div>
    <div class="o-score">O <span class="score">0</span></div>
  </div>
  <div class="result"></div>
  <div class="board">
    <div class="cell" id="cell-0"></div>
    <div class="cell" id="cell-1"></div>
    <div class="cell" id="cell-2"></div>
    <div class="cell" id="cell-3"></div>
    <div class="cell" id="cell-4"></div>
    <div class="cell" id="cell-5"></div>
    <div class="cell" id="cell-6"></div>
    <div class="cell" id="cell-7"></div>
    <div class="cell" id="cell-8"></div>
  </div>
  <button class="restart-btn" type="button" id="resetBtn">Restart Game</button>
</div>

  
  <script src="main.js"></script>
</body>
</html>
